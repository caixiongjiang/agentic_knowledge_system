services:
  # ==================== AKS API (FastAPI 业务后端) ====================
  aks-api:
    build: .
    container_name: aks-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    volumes:
      - ./config:/app/config:ro
    networks:
      - aks-network
      - mysql_default
      - mongodb_default
      - redis_default
      - kafka_kafka-network
      - milvus-gpu_default
      - neo4j_default
      - logto_litellm_pgsql_app-network
      - bge-m3-network
      - vllm-reranker-network
      - vllm-embedding-network

  # ==================== AKS Workers (Kafka 消费端) ====================
  aks-workers:
    build: .
    container_name: aks-workers
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - ./config:/app/config:ro
    command: ["uv", "run", "python", "scripts/start_all_workers.py"]
    networks:
      - aks-network
      - mysql_default
      - mongodb_default
      - redis_default
      - kafka_kafka-network
      - milvus-gpu_default
      - neo4j_default
      - logto_litellm_pgsql_app-network
      - bge-m3-network
      - vllm-reranker-network
      - vllm-embedding-network

networks:
  aks-network:
    driver: bridge
  mysql_default:
    external: true
  mongodb_default:
    external: true
  redis_default:
    external: true
  kafka_kafka-network:
    external: true
  milvus-gpu_default:
    external: true
  neo4j_default:
    external: true
  logto_litellm_pgsql_app-network:
    external: true
  bge-m3-network:
    external: true
  vllm-reranker-network:
    external: true
  vllm-embedding-network:
    external: true

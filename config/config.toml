# Agentic knowledge system configuration file

# ==================== Kafka Topic 命名规范 ====================
# 格式: {业务模块}.{处理阶段}.{事件类型}
# 示例: knowledge_base.index.start, db_write.embedding.start
# 注意: 使用点号分隔（Kafka 不允许使用冒号）

# ==================== 数据库配置 ====================

# Milvus 向量数据库配置
[milvus]
# ========== 模式选择 ==========
# 模式: "server" (标准版，连接远程服务) 或 "lite" (本地版，用于开发测试)
mode = "server"

# ========== Server版配置（生产环境） ==========
host = "192.168.201.14"
port = 19530
# 数据库名称（Milvus 2.x支持多数据库）
database = "default"
# 连接超时时间（秒）
timeout = 30
# 连接别名前缀
alias_prefix = "aks_milvus"

# ========== Lite版配置（开发/测试环境） ==========
# 本地数据库文件路径
lite_db_path = "./data/milvus.db"
# Lite版最大并发连接数
lite_max_connections = 10

# ========== 公共配置 ==========
# 默认集合名称
default_collection = "knowledge_vectors"
# 向量维度
vector_dim = 1024
# 索引类型: IVF_FLAT, IVF_SQ8, IVF_PQ, HNSW
index_type = "HNSW"
# 距离度量: L2, IP, COSINE
metric_type = "COSINE"
# 索引参数
index_params = { M = 16, efConstruction = 256 }
# 搜索参数
search_params = { ef = 128 }

# MongoDB 文档数据库配置
[mongodb]
host = "192.168.201.14"
port = 27017
# 数据库名称
database = "default"
# 连接超时时间（毫秒）
connect_timeout_ms = 5000
server_selection_timeout_ms = 5000
# 连接池配置
max_pool_size = 50
min_pool_size = 10

# MySQL 关系数据库配置
[mysql]
# ========== 模式选择 ==========
# 模式: "mysql" (MySQL Server) 或 "sqlite" (SQLite本地数据库)
mode = "mysql"

# ========== MySQL Server配置 ==========
host = "192.168.201.14"
port = 3306
database = "default"
# 字符集
charset = "utf8mb4"
# 连接池配置
pool_size = 10
max_overflow = 20
pool_timeout = 30
pool_recycle = 3600
# 是否显示SQL语句
echo = true

# ========== SQLite配置 ==========
# SQLite数据库文件路径
sqlite_db_path = "data/sqlite.db"
# 是否显示SQL语句
sqlite_echo = false

# Neo4j 图数据库配置
[neo4j]
uri = "bolt://localhost:7687"
# 连接池配置
max_connection_lifetime = 3600
max_connection_pool_size = 50
connection_acquisition_timeout = 60
# 数据库名称（企业版支持多数据库）
database = "neo4j"

# Redis 缓存配置
[redis]
# 模式选择：standalone（单机）或 cluster（集群）
mode = "standalone"

host = "192.168.201.14"
port = 6379
# 数据库编号（0-15）
db = 2
max_connections = 50        # 连接池最大连接数
socket_timeout = 5.0        # Socket 超时时间（秒）
socket_connect_timeout = 5.0  # Socket 连接超时时间（秒）
decode_responses = true     # 是否自动解码为字符串
encoding = "utf-8"          # 字符编码

# 业务配置（可选）
key_prefix = "aks:"        # 全局键前缀
default_expire = 3600      # 默认过期时间（秒）

# ==================== 对象存储配置 ====================

[storage]
# 存储类型: minio, oss, gcs, s3
type = "minio"

# MinIO 对象存储配置
[minio]
endpoint = "192.168.201.14:9000"
# 是否使用安全连接
secure = false
# 默认存储桶
default_bucket = "default"
# 区域
region = "us-east-1"
# 上传分片大小（字节）
part_size = 10485760  # 10MB

# Kafka 消息队列配置
[kafka]
# ========== Broker配置 ==========
# Kafka集群地址（多个地址用逗号分隔）
bootstrap_servers = ["192.168.201.14:9092"]
# 安全协议: PLAINTEXT, SSL, SASL_PLAINTEXT, SASL_SSL
security_protocol = "PLAINTEXT"
# SASL机制: PLAIN, SCRAM-SHA-256, SCRAM-SHA-512
sasl_mechanism = "PLAIN"

# ========== Producer配置 ==========
[kafka.producer]
# 消息确认模式: 0(无确认), 1(leader确认), all(所有副本确认)
# 注意: 配置中使用 "all"，代码会自动转换为 -1（aiokafka 要求）
acks = "all"
# 批处理大小（字节，映射到 aiokafka 的 max_batch_size）
batch_size = 65536
# 批处理延迟时间（毫秒）
linger_ms = 5
# 压缩类型: none, gzip, snappy, lz4, zstd
compression_type = "lz4"
# 请求超时时间（毫秒）
request_timeout_ms = 30000
# 最大请求大小（字节）
max_request_size = 1048576  # 1MB

# ========== Consumer配置 ==========
[kafka.consumer]
# Consumer Group ID前缀（实际使用时会加上组件名称）
group_id_prefix = "aks"
# 自动提交offset
enable_auto_commit = false
# 自动提交间隔（毫秒）
auto_commit_interval_ms = 5000
# 消费位置策略: earliest（从头开始）, latest（从最新开始）
auto_offset_reset = "earliest"
# 单次拉取最大记录数
max_poll_records = 500
# 单次拉取最小字节数
fetch_min_bytes = 1024
# 单次拉取最大等待时间（毫秒）
fetch_max_wait_ms = 500
# Session超时时间（毫秒）
session_timeout_ms = 30000
# 心跳间隔（毫秒）
heartbeat_interval_ms = 3000
# 最大拉取间隔（毫秒）
max_poll_interval_ms = 300000

# ========== Topic配置 ==========
[kafka.topics]
# Topic副本因子
replication_factor = 1
# 最小同步副本数
min_insync_replicas = 1
# 消息保留时间（毫秒）
retention_ms = 604800000  # 7天
# 消息保留大小（字节，-1表示无限制）
retention_bytes = -1
# 日志清理策略: delete, compact
cleanup_policy = "delete"

# ========== 前台阶段Topic分区数 ==========
# 高并发入口，需快速分发
index_start_partitions = 32
# 承接上游，保持一致
parse_end_partitions = 32
# 触发多个Consumer
split_end_partitions = 32

# ========== 后台阶段Topic分区数 ==========
# 后台任务，并行度要求较低
summary_end_partitions = 16
graph_end_partitions = 16
image_end_partitions = 16

# ========== 数据库写入Topic分区数 ==========
# 向量写入量最大，核心瓶颈
embedding_start_partitions = 32
# 图谱写入量中等
graph_start_partitions = 16
# 元数据写入频繁
meta_start_partitions = 32
# 文档写入量大
mongo_start_partitions = 32

# ========== 批处理配置 ==========
[kafka.batch]
# EmbeddingMilvusWriter批处理配置
embedding_batch_size = 100
embedding_flush_interval_ms = 500
embedding_api_batch_size = 64  # 单次Embedding API请求的batch size
milvus_insert_batch_size = 100

# Neo4jWriter批处理配置
neo4j_batch_size = 500
neo4j_flush_interval_ms = 2000

# MySQLWriter批处理配置
mysql_batch_size = 200
mysql_flush_interval_ms = 1000

# MongoWriter批处理配置
mongo_batch_size = 100
mongo_flush_interval_ms = 500

# ========== 重试和DLQ配置 ==========
[kafka.retry]
# 最大重试次数
max_retries = 3
# 重试延迟（秒）
retry_delays = [1, 5, 30]
# 是否启用DLQ（死信队列）
enable_dlq = true
# DLQ Topic后缀
dlq_suffix = ".dlq"
# 重试Topic后缀
retry_suffix = ".retry"

# ========== 幂等性配置 ==========
[kafka.idempotency]
# 是否启用幂等性检查
enable = true
# 去重缓存过期时间（秒）
dedup_cache_ttl = 86400  # 24小时
# 使用Redis作为去重缓存
use_redis = true

# ==================== 模型配置 ====================

# Embedding 模型配置（本地部署）
[embedding]
# 本地Embedding服务API地址（不要包含 /v1，代码会自动添加 /v1/embeddings）
# 例如: "http://192.168.201.14:18084/v1" -> 最终请求 "http://192.168.201.14:18084/v1/embeddings"
api_base = "http://192.168.201.14:18084/v1"
# 模型名称或路径
model_name = "qwen3-embedding-0.6b"
# 向量维度（必须与Milvus配置的vector_dim一致）
dimension = 1024
# 批处理大小
batch_size = 64
# 请求超时时间（秒，必填）
timeout = 60.0
# 是否启用重试机制
enable_retry = true
# 最大重试次数（仅在enable_retry=true时生效）
max_retries = 3
# 重试延迟时间（秒）
retry_delay = 0.5
# 重试策略: fixed（固定延迟）, exponential（指数退避）, linear（线性递增）
retry_strategy = "exponential"
# 最大重试延迟上限（秒）
max_retry_delay = 10.0

# 稀疏向量 Embedding 模型配置（BGE-M3，本地部署）
[sparse_embedding]
# BGE-M3 稀疏向量服务 API 地址
api_base = "http://192.168.201.14:18085/v1"
# 模型名称
model_name = "bge-m3"
# 批处理大小
batch_size = 64
# 请求超时时间（秒，必填）
timeout = 60.0
# 是否启用重试机制
enable_retry = true
# 最大重试次数
max_retries = 3
# 重试延迟时间（秒）
retry_delay = 0.5
# 重试策略: fixed, exponential, linear
retry_strategy = "exponential"
# 最大重试延迟上限（秒）
max_retry_delay = 10.0

# Reranker 模型配置
[reranker]
# 模型提供商: cohere, jina, bge, local
provider = "local"
# 模型名称或路径
model_name = "BAAI/bge-reranker-v2-m3"
# API基础URL（如果是API服务）
api_base = ""
# 批处理大小
batch_size = 16
# Top K 返回数量
top_k = 10
# 超时时间（秒）
timeout = 30
# 最大重试次数
max_retries = 3

# ==================== 第三方服务配置 ====================

# MinerU 服务配置（PDF解析）
[mineru]
# API服务地址
api_url = "http://192.168.201.14:18000"
# 超时时间（秒）
timeout = 300

# ==================== 系统配置 ====================

# 日志配置
[logging]
# 日志级别: DEBUG, INFO, WARNING, ERROR, CRITICAL
level = "INFO"
# 日志文件路径
log_dir = "logs"
# 日志文件名
log_file = "dev.log"
# 日志格式
format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
# 单个日志文件最大大小（MB）
max_bytes = 100
# 保留的日志文件数量
backup_count = 10

# 文件处理配置
[file_upload]
# 支持的文件类型
supported_formats = ["pdf", "docx", "pptx", "xlsx", "txt", "md", "json"]
# 最大文件大小（MB）
max_file_size = 100
# 文件上传临时目录
temp_dir = "upload"

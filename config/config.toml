# Agentic knowledge system configuration file

# ==================== Kafka Topic 命名规范 ====================
# 格式: {业务模块}.{处理阶段}.{事件类型}
# 示例: knowledge_base.index.start, db_write.embedding.start
# 注意: 使用点号分隔（Kafka 不允许使用冒号）

# ==================== 数据库配置 ====================

# Milvus 向量数据库配置
[milvus]
# ========== 模式选择 ==========
# 模式: "server" (标准版，连接远程服务) 或 "lite" (本地版，用于开发测试)
mode = "server"

# ========== Server版配置（生产环境） ==========
host = "192.168.201.14"
port = 19530
# 数据库名称（Milvus 2.x支持多数据库）
database = "default"
# 连接超时时间（秒）
timeout = 30
# 连接别名前缀
alias_prefix = "aks_milvus"

# ========== Lite版配置（开发/测试环境） ==========
# 本地数据库文件路径
lite_db_path = "./data/milvus.db"
# Lite版最大并发连接数
lite_max_connections = 10

# ========== 公共配置 ==========
# 默认集合名称
default_collection = "knowledge_vectors"
# 向量维度
vector_dim = 1024
# 索引类型: IVF_FLAT, IVF_SQ8, IVF_PQ, HNSW
index_type = "HNSW"
# 距离度量: L2, IP, COSINE
metric_type = "COSINE"
# 索引参数
index_params = { M = 16, efConstruction = 256 }
# 搜索参数
search_params = { ef = 128 }

# MongoDB 文档数据库配置
[mongodb]
host = "192.168.201.14"
port = 27017
# 数据库名称
database = "default"
# 连接超时时间（毫秒）
connect_timeout_ms = 5000
server_selection_timeout_ms = 5000
# 连接池配置
max_pool_size = 50
min_pool_size = 10

# MySQL 关系数据库配置
[mysql]
# ========== 模式选择 ==========
# 模式: "mysql" (MySQL Server) 或 "sqlite" (SQLite本地数据库)
mode = "mysql"

# ========== MySQL Server配置 ==========
host = "192.168.201.14"
port = 3306
database = "default"
# 字符集
charset = "utf8mb4"
# 连接池配置
pool_size = 10
max_overflow = 20
pool_timeout = 30
pool_recycle = 3600
# 是否显示SQL语句（true 时每条 SQL 会以 INFO 打到日志）
echo = false

# ========== SQLite配置 ==========
# SQLite数据库文件路径
sqlite_db_path = "data/sqlite.db"
# 是否显示SQL语句
sqlite_echo = false

# Neo4j 图数据库配置
[neo4j]
uri = "bolt://localhost:7687"
# 连接池配置
max_connection_lifetime = 3600
max_connection_pool_size = 50
connection_acquisition_timeout = 60
# 数据库名称（企业版支持多数据库）
database = "neo4j"

# Redis 缓存配置
[redis]
# 模式选择：standalone（单机）或 cluster（集群）
mode = "standalone"

host = "192.168.201.14"
port = 6379
# 数据库编号（0-15）
db = 2
max_connections = 50        # 连接池最大连接数
socket_timeout = 5.0        # Socket 超时时间（秒）
socket_connect_timeout = 5.0  # Socket 连接超时时间（秒）
decode_responses = true     # 是否自动解码为字符串
encoding = "utf-8"          # 字符编码

# 业务配置（可选）
key_prefix = "aks:"        # 全局键前缀
default_expire = 3600      # 默认过期时间（秒）

# ==================== 对象存储配置 ====================

[storage]
# 存储类型: minio, oss, gcs, s3
type = "minio"

# MinIO 对象存储配置
[minio]
endpoint = "192.168.201.14:9000"
# 是否使用安全连接
secure = false
# 默认存储桶
default_bucket = "default"
# 区域
region = "us-east-1"
# 上传分片大小（字节）
part_size = 10485760  # 10MB

# Kafka 消息队列配置
[kafka]
# ========== Broker配置 ==========
# Kafka集群地址（多个地址用逗号分隔）
bootstrap_servers = ["192.168.201.14:9092"]
# 安全协议: PLAINTEXT, SSL, SASL_PLAINTEXT, SASL_SSL
security_protocol = "PLAINTEXT"
# SASL机制: PLAIN, SCRAM-SHA-256, SCRAM-SHA-512
sasl_mechanism = "PLAIN"

# ========== Producer配置 ==========
[kafka.producer]
# 消息确认模式: 0(无确认), 1(leader确认), all(所有副本确认)
# 注意: 配置中使用 "all"，代码会自动转换为 -1（aiokafka 要求）
acks = "all"
# 批处理大小（字节，映射到 aiokafka 的 max_batch_size）
batch_size = 65536
# 批处理延迟时间（毫秒）
linger_ms = 5
# 压缩类型: none, gzip, snappy, lz4, zstd
compression_type = "lz4"
# 请求超时时间（毫秒）
request_timeout_ms = 30000
# 最大请求大小（字节）
max_request_size = 1048576  # 1MB

# ========== Consumer配置 ==========
[kafka.consumer]
# Consumer Group ID前缀（实际使用时会加上组件名称）
group_id_prefix = "aks"
# 自动提交offset
enable_auto_commit = false
# 自动提交间隔（毫秒）
auto_commit_interval_ms = 5000
# 消费位置策略: earliest（从头开始）, latest（从最新开始）
auto_offset_reset = "earliest"
# 单次拉取最大记录数
max_poll_records = 500
# 单次拉取最小字节数（设为1：空闲时 broker 立即返回空结果，避免无谓等待）
fetch_min_bytes = 1
# 单次拉取最大等待时间（毫秒）
fetch_max_wait_ms = 500
# 请求超时时间（毫秒，必须 > session_timeout_ms，避免空闲时 RequestTimedOutError）
request_timeout_ms = 60000
# 请求失败后的退避时间（毫秒）
retry_backoff_ms = 500
# Session超时时间（毫秒）
session_timeout_ms = 30000
# 心跳间隔（毫秒）
heartbeat_interval_ms = 3000
# 最大拉取间隔（毫秒）
max_poll_interval_ms = 300000

# ========== Topic配置 ==========
[kafka.topics]
# Topic副本因子
replication_factor = 1
# 最小同步副本数
min_insync_replicas = 1
# 消息保留时间（毫秒）
retention_ms = 604800000  # 7天
# 消息保留大小（字节，-1表示无限制）
retention_bytes = -1
# 日志清理策略: delete, compact
cleanup_policy = "delete"

# ========== 前台阶段Topic分区数 ==========
# 高并发入口，需快速分发
index_start_partitions = 32
# 承接上游，保持一致
parse_end_partitions = 32
# 触发多个Consumer
split_end_partitions = 32

# ========== 后台阶段Topic分区数 ==========
# 后台任务，并行度要求较低
summary_end_partitions = 16
graph_end_partitions = 16
image_end_partitions = 16

# ========== 数据库写入Topic分区数 ==========
# 向量写入量最大，核心瓶颈
embedding_start_partitions = 32
# 图谱写入量中等
graph_start_partitions = 16
# 元数据写入频繁
meta_start_partitions = 32
# 文档写入量大
mongo_start_partitions = 32

# ========== 批处理配置 ==========
[kafka.batch]
# EmbeddingMilvusWriter批处理配置
embedding_batch_size = 100
embedding_flush_interval_ms = 500
embedding_api_batch_size = 64  # 单次Embedding API请求的batch size
milvus_insert_batch_size = 100

# Neo4jWriter批处理配置
neo4j_batch_size = 500
neo4j_flush_interval_ms = 2000

# MySQLWriter批处理配置
mysql_batch_size = 200
mysql_flush_interval_ms = 1000

# MongoWriter批处理配置
mongo_batch_size = 100
mongo_flush_interval_ms = 500

# ========== 重试和DLQ配置 ==========
[kafka.retry]
# 最大重试次数
max_retries = 3
# 重试延迟（秒）
retry_delays = [1, 5, 30]
# 是否启用DLQ（死信队列）
enable_dlq = true
# DLQ Topic后缀
dlq_suffix = ".dlq"
# 重试Topic后缀
retry_suffix = ".retry"

# ========== 幂等性配置 ==========
[kafka.idempotency]
# 是否启用幂等性检查
enable = true
# 去重缓存过期时间（秒）
dedup_cache_ttl = 86400  # 24小时
# 使用Redis作为去重缓存
use_redis = true

# ==================== 模型网关（LiteLLM Proxy） ====================
# 同时被 LLM / Embedding / Reranker 三类模型复用：
# - api_base 默认值在此声明（建议留空，由 .env: LITELLM_PROXY_URL 提供，避免把 endpoint 写进版本库）
# - api_key 永远只来自 .env: LITELLM_PROXY_KEY
# - default_timeout / default_max_retries 是 LLM/embedding/reranker 客户端的兜底值

[proxy]
api_base = ""
default_timeout = 60
default_max_retries = 2

# ==================== LLM 配置（LiteLLM 统一接入） ====================
# - 模型字符串使用 LiteLLM 原生格式：'<provider>/<model>'
# - 各 preset 可在 components.json 里以 "llm_preset" 引用；
#   也可在 components.json 内联 "llm" 字段为单个组件指定独立模型
# - api_base / api_key 默认走 [proxy]，可在单个 preset 中覆盖

[llm]
# 思考链（thinking）三层语义，便于全局对齐：
#
#   1) ``[llm.presets.<name>].thinking_budget`` / ``components.<name>.llm.thinking_budget``
#      —— **某条调用路径"默认"是否开思考及预算**（int）。
#         缺省视为 0，意为"不显式声明，按上游模型/Proxy 默认行为"。
#
#   2) 业务请求 ``LLMClient.astream(thinking_budget=...)``（Optional[int]）
#      —— **本次调用如何覆盖默认**：``None`` 沿用 cfg；``0`` 显式关；``>0`` 显式开+预算。
#
#   3) 实际下发：``reasoning_effort = none | low | medium | high``（LiteLLM 统一参数），
#      由 LiteLLM / Proxy 按 provider 翻译；不支持的参数应 ``drop_params: true`` 丢弃。
#      详见 ``LLMClient._apply_thinking_params``。
#
# 注：``model`` 字段必须是你的 LiteLLM Proxy 上真实可路由的模型名。
# 推荐写法：``litellm_proxy/<proxy 上 model_name 的原值>``，让 LiteLLM SDK
# 走 ``litellm_proxy`` 透传分支，把模型字符串原样转发给 proxy。
# 不带任何前缀的裸名（如 ``deepseek-v4-flash``）也会被 ``_ensure_proxy_routable``
# 在运行时自动补上 ``litellm_proxy/`` 前缀，但显式声明更易读。

[llm.presets.fast]
# 性价比优先；用于起标题 / 摘要压缩 / 检索结果 LLM 验证等"短轻"调用
model = "litellm_proxy/deepseek-v4-flash"
temperature = 0.0
max_tokens = 65536
timeout = 60

[llm.presets.quality]
model = "litellm_proxy/deepseek-v4-pro"
temperature = 0.3
max_tokens = 65536
timeout = 60

[llm.presets.reasoning]
# 推理优先；用于 RoutePlanner（检索路由规划）等需要复杂推理的内部调用
model = "litellm_proxy/glm-5.1"
temperature = 0.0
max_tokens = 65536
timeout = 120
thinking_budget = 4096

[llm.presets.long_context]
model = "litellm_proxy/deepseek-v4-flash"
temperature = 0.5
max_tokens = 65536
timeout = 90

[llm.presets.multimodal]
# 若 proxy 上没有真正的多模态模型，可保留作占位；
# 业务路径只在显式启用多模态时才会引用本 preset
model = "litellm_proxy/qwen3.6-flash"
temperature = 0.7
max_tokens = 65536
timeout = 90

[llm.presets.test]
model = "litellm_proxy/deepseek-v4-flash"
temperature = 0.3
max_tokens = 65536
timeout = 60

# ==================== Chat 模块配置 ====================
# 知识库对话服务（src/service/chat/chat_service.py）的运行参数
# - 通过 `ChatServiceConfig.from_config_manager()` 读取
# - LLM 选型直接引用 [llm.presets.*]；本服务不走 components.json
#   （components.json 仅服务于 RAG 抽取 Pipeline 的 Kafka Worker 组件）

[chat]
# 主对话 LLM 的 preset（ChatRequest / ChatSession 都未指定时用该默认）
# 如需细调 temperature / max_tokens / thinking_budget，请在 [llm.presets.*] 加自定义 preset
agent_model_preset = "fast"
# 异步起标题用的 preset（首轮结束后调用 1 次，性价比优先）
title_model_preset = "fast"
# 用户从前端 /api/chat/models 选了具体 model 时，作为采样参数模板的 preset
# （temperature / max_tokens / thinking_budget / extra_params 取自该 preset，
#  model 字段被前端选定的字符串覆盖）
user_chat_template_preset = "fast"
# 会话默认交互模式（agent=工具循环 / plan=先规划再执行）
default_mode = "agent"
# 是否默认启用思考链（仅 reasoning 类模型生效）
default_enable_thinking = false
# Agent 模式默认工具批次上限
default_max_tool_rounds = 5
# @ 内联引用（方案A）：单个 @ 文件全量注入正文的字符上限；超过则退化为方案C（仅提示 document_id）
mention_inject_max_chars = 6000
# @ 内联引用（方案A）：单轮所有 @ 文件全量注入正文的合计字符预算；超预算的文件退化为方案C
mention_inject_total_budget = 12000
# 启用思考链时的预算（tokens）；仅 enable_thinking=true 时透传给 LLMClient.astream
thinking_budget = 4096
# 单轮 assistant 输出 token 上限；0 / 缺省表示由模型 / preset 决定
max_completion_tokens = 0

[chat.retrieval]
# 服务端初始检索 top_k
top_k = 8

[chat.history]
# 加载历史消息上限（条数维度）
max_messages = 40
# 轮数滑窗上限（与 token 滑窗叠加；同时按"对话轮"为最小粒度，保 tool_calls 完整）
max_turns = 12
# token 滑窗预算
max_tokens = 8000
# 启用摘要压缩的轮数阈值；0 表示关闭摘要压缩
summary_compress_threshold_turns = 15
# 摘要压缩后保留的最近轮数
summary_keep_recent_turns = 4

# ==================== Embedding 配置（LiteLLM 统一接入） ====================
# - 业务约束（dimension/batch_size/max_concurrent）在 [embedding] 节
# - 模型路由（model 字符串）在 [embedding.presets.*] 节，可被 components.json 引用
# - api_base / api_key 默认走 [proxy]，可在 preset 中覆盖

[embedding]
# 默认 preset 名称（components 未声明 embedding/embedding_preset 时使用）
default_preset = "local_dense"
# 稠密向量维度（业务约束，必须与 [milvus].vector_dim 一致；模型返回不一致时报错）
dimension = 1024
# 单批次发往 Embedding 服务的文本数量
batch_size = 64
# aembed_concurrent 的最大并发请求数
max_concurrent = 5
# 请求超时（秒），preset 未指定时使用此值
timeout = 60.0

[embedding.presets.local_dense]
# 通过 LiteLLM Proxy 调用本地 qwen3-embedding-0.6b（OpenAI 兼容 /embeddings）
model = "openai/qwen3-embedding-0.6b"
# 可选：dimension / batch_size / timeout / api_base / api_key / extra_params

# 示例：未来想用 OpenAI text-embedding-3-large
# [embedding.presets.openai_large]
# model = "openai/text-embedding-3-large"
# dimension = 3072

# ==================== Sparse Embedding 配置（BGE-M3，独立实现） ====================
# 注：LiteLLM 暂不支持 BGE-M3 sparse 输出，保留独立 httpx 实现。

[sparse_embedding]
# BGE-M3 稀疏向量服务 API 地址
api_base = "http://192.168.201.14:18085/v1"
# 模型名称
model_name = "bge-m3"
# 批处理大小
batch_size = 64
# 请求超时时间（秒，必填）
timeout = 60.0
# 是否启用重试机制
enable_retry = true
# 最大重试次数
max_retries = 3
# 重试延迟时间（秒）
retry_delay = 0.5
# 重试策略: fixed, exponential, linear
retry_strategy = "exponential"
# 最大重试延迟上限（秒）
max_retry_delay = 10.0

# ==================== Reranker 配置（LiteLLM 统一接入） ====================
# - LiteLLM 走 cohere /rerank 协议；vLLM 部署的 Qwen3-reranker 完全兼容该格式
# - 业务约束（batch_size/top_k）在 [reranker] 节，模型路由在 [reranker.presets.*]

[reranker]
# 默认 preset 名称
default_preset = "local_rerank"
# 单批次发往 Reranker 的文档数量
batch_size = 16
# 默认返回 Top-K 数量
top_k = 10
# 请求超时（秒）
timeout = 30.0

[reranker.presets.local_rerank]
# 通过 LiteLLM Proxy 调用本地 qwen3-reranker-0.6b（cohere /rerank 格式）
model = "cohere/qwen3-reranker-0.6b"
# 可选：top_k / batch_size / timeout / api_base / api_key / extra_params

# ==================== 第三方服务配置 ====================

# MinerU 服务配置（PDF解析）
[mineru]
# API服务地址
api_url = "http://192.168.19.232:18000"
# 超时时间（秒）
timeout = 300

# ==================== 系统配置 ====================

# 日志配置
[logging]
# 日志级别: DEBUG, INFO, WARNING, ERROR, CRITICAL
level = "INFO"
# 日志文件路径
log_dir = "logs"
# 日志文件名
log_file = "dev.log"
# 日志格式
format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
# 单个日志文件最大大小（MB）
max_bytes = 100
# 保留的日志文件数量
backup_count = 10

# 文件处理配置
[file_upload]
# 支持的文件类型
supported_formats = ["pdf", "docx", "pptx", "xlsx", "txt", "md", "json", "csv", "doc", "xls", "ppt", "png", "jpg", "jpeg", "gif", "webp", "svg", "bmp"]
# 最大文件大小（MB）
max_file_size = 100
# 文件上传临时目录
temp_dir = "upload"

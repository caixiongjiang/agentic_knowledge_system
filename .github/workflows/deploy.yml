name: Deploy AKS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy AKS
        run: |
          set -e
          cd ${{ secrets.DEPLOY_PATH }}/agentic_knowledge_system
          git pull origin main
          docker compose up -d --build
          docker image prune -f
          echo "✅ AKS deployed at $(date)"
